name: Build Windows installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller>=6.6

      - name: Build web SPA
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build shelvrd binary
        run: pyinstaller installer/shelvrd.spec --noconfirm --clean

      - name: Smoke-test bundled binary
        run: dist/shelvrd/shelvrd.exe --help

      - name: Upload shelvrd artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelvrd-windows
          path: dist/shelvrd
          if-no-files-found: error
