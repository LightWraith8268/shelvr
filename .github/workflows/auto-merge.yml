name: Auto-merge claude/dev to main

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [claude/dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR (or reuse existing)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --head claude/dev --base main --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "Reusing PR #$existing"
          else
            number=$(gh pr create \
              --base main \
              --head claude/dev \
              --title "Auto-merge claude/dev to main" \
              --body "Automated merge of claude/dev. Generated by .github/workflows/auto-merge.yml." \
              | tail -n1 | grep -oE '[0-9]+$')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "Opened PR #$number"
          fi

      - name: Admin-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --admin --merge

      - name: Dispatch release workflow
        # GITHUB_TOKEN-driven merges don't trigger downstream `push` workflows,
        # so we explicitly kick off release.yml against main here.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref main
