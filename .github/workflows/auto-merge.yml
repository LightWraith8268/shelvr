name: Auto-merge claude/dev to main

on:
  push:
    branches: [claude/dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for CI to finish
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          running-workflow-name: Auto-merge claude/dev to main
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

      - name: Open PR (or reuse existing)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --head claude/dev --base main --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "Reusing PR #$existing"
          else
            number=$(gh pr create \
              --base main \
              --head claude/dev \
              --title "Auto-merge claude/dev to main" \
              --body "Automated merge of claude/dev. Generated by .github/workflows/auto-merge.yml." \
              | tail -n1 | grep -oE '[0-9]+$')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "Opened PR #$number"
          fi

      - name: Admin-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --admin --merge
