name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type check
        run: mypy shelvr
      - name: Test
        run: pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version bump
        id: bump
        run: |
          set -euo pipefail
          current_version=$(grep -oE '^version = "[^"]+"' pyproject.toml | head -n1 | sed -E 's/version = "([^"]+)"/\1/')
          last_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$last_tag" ]; then
            range="HEAD"
          else
            range="${last_tag}..HEAD"
          fi

          subjects=$(git log --pretty=%s "$range")
          bump="none"
          if echo "$subjects" | grep -qE '^(feat|fix|refactor|perf|chore|docs)(\([^)]+\))?!:|BREAKING CHANGE'; then
            bump="major"
          elif echo "$subjects" | grep -qE '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif echo "$subjects" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
            bump="patch"
          fi

          IFS=. read -r major minor patch <<< "$current_version"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            none) echo "No release-worthy commits since $last_tag" ; echo "skip=true" >> "$GITHUB_OUTPUT" ; exit 0 ;;
          esac
          new_version="${major}.${minor}.${patch}"
          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "new=$new_version" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update pyproject and shelvr/__init__.py
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          new="${{ steps.bump.outputs.new }}"
          sed -i -E "s/^version = \"[^\"]+\"/version = \"$new\"/" pyproject.toml
          if [ -f shelvr/__init__.py ] && grep -q '^__version__' shelvr/__init__.py; then
            sed -i -E "s/^__version__ = \"[^\"]+\"/__version__ = \"$new\"/" shelvr/__init__.py
          fi

      - name: Update CHANGELOG
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.bump.outputs.tag }}"
          new="${{ steps.bump.outputs.new }}"
          today=$(date -u +%Y-%m-%d)
          last_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$last_tag" ]; then
            range="HEAD"
          else
            range="${last_tag}..HEAD"
          fi
          {
            echo "## [$new] - $today"
            echo
            git log --pretty='- %s' "$range" | grep -vE '^\- (chore|ci|build|docs)\(release\)' || true
            echo
          } > /tmp/release-block.md

          if [ ! -f CHANGELOG.md ]; then
            {
              echo "# Changelog"
              echo
              echo "All notable changes are documented here. Format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and the project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
              echo
            } > CHANGELOG.md
          fi
          # Insert the new release block after the file's intro (between line 4 and the rest).
          head -n 4 CHANGELOG.md > /tmp/changelog.head
          tail -n +5 CHANGELOG.md > /tmp/changelog.tail
          cat /tmp/changelog.head /tmp/release-block.md /tmp/changelog.tail > CHANGELOG.md

      - name: Build sdist and wheel
        if: steps.bump.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Commit version bump and tag
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md shelvr/__init__.py 2>/dev/null || true
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file /tmp/release-block.md \
            dist/*
